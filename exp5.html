<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiment-5</title>
<style>
    .container{
        text-align: center;
        display: block;
        background-color: rgb(22, 206, 212);
        margin: 30px;
        padding: 10px;
    }
    .button{
        padding: 5px;
        margin: 5px;
        background-color: rgb(114, 192, 17);
    }
    #name{
        height: 30px;
        width: 250px;
        border-radius: 10px;
        margin-left: 50px;
    }
    #id{
        height: 30px;
        width: 250px;
        border-radius: 10px;
    }
    #salary{
        height: 30px;
        width: 250px;
        border-radius: 10px;
        margin-left: 45px;
    }
    #department{
        height: 30px;
        width: 250px;
        border-radius: 10px;
        margin-left: 10px;
    }
    .button:hover{
        background-color: rgb(227, 233, 229);
    }
</style>
</head>
<body>
<div class="container">
<h1>Enter Employee Details!</h1>
<div class="labels">
<label for="name">Name</label>
<input type="text" id="name" placeholder="Enter Name" required><br><br>
<label for="id">Employee ID</label>
<input type="number" id="id" placeholder="Enter Employee ID" required><br><br>
<label for="salary">Salary</label>
<input type="number" id="salary" placeholder="Enter Salary" required><br><br>
<label for="department">Department</label>
<input type="text" id="department" placeholder="Enter Department" required><br><br>
</div>
<button onclick="addEmployee()" class="button">Add Employee</button><br><br>
<button onclick="filterSalary()" class="button">Salary > 50,000</button>
<button onclick="displayEmployees()" class="button">Display Employee</button>
<button onclick="totalSalary()" class="button">Total Salary</button>
<button onclick="averageSalary()" class="button">Average Salary</button><br><br>
<button onclick="sortByDepartment()" class="button">Sort by Department</button>
</div>
<div class="result"></div>
<script>
    let employees = [];
    function addEmployee() {
        let name = document.getElementById("name").value;
        let id = document.getElementById("id").value;
        let salary = parseFloat(document.getElementById("salary").value);
        let department = document.getElementById("department").value;
        if (name === "" || id === "" || isNaN(salary) || department === "") {
            alert("Please fill all fields properly");
            return;
        }
        let employee = { name, id, salary, department };
        employees.push(employee);
        alert("Employee Added Successfully!");
        document.getElementById("name").value = "";
        document.getElementById("id").value = "";
        document.getElementById("salary").value = "";
        document.getElementById("department").value = "";
    }
    function displayEmployees() {
        let output = "<h3>All Employees</h3>";
        if (employees.length === 0) {
            output += "No employees added yet.";
        }
        employees.forEach(emp => {
            output += `Name: ${emp.name} | ID: ${emp.id} | Salary: ₹${emp.salary} | Department: ${emp.department}<br>`;
        });
        document.querySelector(".result").innerHTML = output;
    }
    function filterSalary() {
        let filtered = employees.filter(emp => emp.salary > 50000);
        let output = "<h3>Employees with Salary > ₹50,000</h3>";
        if (filtered.length === 0) {
            output += "No employees found.";
        }
        filtered.forEach(emp => {
            output += `Name: ${emp.name} | Salary: ₹${emp.salary}<br>`;
        });
        document.querySelector(".result").innerHTML = output;
    }
    function totalSalary() {
        let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
        document.querySelector(".result").innerHTML = "<h3>Total Salary Payout: ₹" + total + "</h3>";
    }
    function averageSalary() {
        if (employees.length === 0) {
            document.querySelector(".result").innerHTML = "<h3>No employee records available</h3>";
            return;
        }
        let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
        let avg = total / employees.length;
        document.querySelector(".result").innerHTML = "<h3>Average Salary: ₹" + avg.toFixed(2) + "</h3>";
    }
    function sortByDepartment() {
        let sorted = [...employees].sort((a, b) => a.department.localeCompare(b.department));
        let output = "<h3>Employees Sorted by Department</h3>";
        sorted.forEach(emp => {
            output += `Name: ${emp.name} | Department: ${emp.department} | Salary: ₹${emp.salary}<br>`;
        });
        document.querySelector(".result").innerHTML = output;
    }
</script>
</body>
</html>
