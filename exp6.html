<!DOCTYPE html> 
<html lang="en"> 
<head> 
  <meta charset="UTF-8"> 
  <title>Experiment 6</title> 
  <style>
    Body 
{ 
  font-family:Arial, sans-serif; 
  background-color:#f0f0f0; 
  display:flex; 
  justify-content:center; 
  align-items:center; 
  height:100vh; 
  margin:0; 
} 
 
.box{ 
  background:white; 
  padding:20px; 
  border-radius:10px; 
  text-align:center; 
    width:350px; 
} 
 
input{ 
  padding:8px; 
  width:80%; 
  margin-bottom:10px; 
} 
 
.buttons{ 
  margin-bottom:10px; 
} 
 
button{ 
margin:5px; 
padding: 8px 10px; 
background-color:beige; 
color: black; 
border-radius:5px; 
cursor:pointer; 
}p 
{ 
font-size: 16px; 
}
  </style>
</head> 
<body> 
 
<div class="container"> 
  <h2 id="heading">Welcome to JavaScript Lab</h2> 
 
  <input type="text" id="nameInput" placeholder="Enter your name"> 
 
  <div class="buttons"> 
    <button onclick="changeBackground()">Change Background</button> 
    <button onclick="changeHeading()">Change Heading</button> 
    <button onclick="changeParagraph()">Change Paragraph</button> 
    <button onclick="changeFont()">Change Font Size</button> 
    <button onclick="resetAll()">Reset</button> 
  </div> 
 
  <p id="para"> 
    This is a sample paragraph. JavaScript events can dynamically change content. 
  </p> 
</div> 
 
<script>
    function changeBackground(){ 
  document.body.style.backgroundColor =  '#'+Math.floor(Math.random()*16777215).toString(16); 
} 
 
function changeHeading(){ 
  let name = document.getElementById("nameInput").value; 
 
  if (name==="") { 
    document.getElementById("heading").innerText = 
      "Welcome to JavaScript Lab"; 
  }else{ 
    document.getElementById("heading").innerText = 
      "Hello,"+name+"!"; 
  } 
} 
 
function changeParagraph() { 
  document.getElementById("para").innerText = 
    "The paragraph text has been changed using JavaScript!"; 
} 
 
function changeFont() { 
  document.getElementById("para").style.fontSize = "20px"; 
} 
 
function resetAll() { 
  document.body.style.backgroundColor = "#FFFFFF"; 
 
  document.getElementById("heading").innerText = 
    "Welcome to JavaScript Lab"; 
document.getElementById("para").innerText = 
"This is a sample paragraph. JavaScript events can dynamically change content."; 
document.getElementById("para") 
.style.fontSize = "16px"; 
document.getElementById("nameInput").value = " "; 
}
</script> 
</body> 
</html>
